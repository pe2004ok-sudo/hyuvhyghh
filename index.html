<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lịch Làm Việc Shin</title>

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Baloo 2', cursive;
}

body{

  min-height:100vh;

  padding:25px;

  background:#fdf6e3;

  /* ẢNH SHIN */
  background-image:url('./shin.jpg');

  background-size:cover;

  background-position:center;

  background-repeat:no-repeat;

  background-attachment:fixed;
}

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:rgba(255,255,255,0.72);

  z-index:-1;
}

.container{

  width:100%;

  max-width:1500px;

  margin:auto;
}

/* ========================= */
/* TITLE */
/* ========================= */

.title-box{

  display:flex;

  justify-content:center;

  align-items:center;

  gap:25px;

  margin-bottom:25px;

  background:white;

  padding:20px;

  border-radius:30px;

  border:5px solid black;

  box-shadow:8px 8px 0px #f6c445;
}

.title-text{

  font-size:72px;

  font-weight:900;

  color:black;

  text-shadow:
    6px 6px 0px #f6c445;

  letter-spacing:3px;
}

.title-icon{

  width:80px;

  height:80px;

  object-fit:cover;

  border-radius:18px;
}

/* ========================= */
/* TOP BAR */
/* ========================= */

.top-bar{

  display:flex;

  justify-content:flex-start;

  margin-bottom:25px;
}

.week-select{

  padding:12px 18px;

  border-radius:16px;

  border:3px solid black;

  background:#fff3b0;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;
}

/* ========================= */
/* TABLE */
/* ========================= */

#pdfContent{

  background:white;

  border-radius:35px;

  overflow:hidden;

  border:5px solid black;

  box-shadow:10px 10px 0px #ffcc80;
}

table{

  width:100%;

  border-collapse:collapse;

  table-layout:fixed;
}

th{

  border-right:3px solid black;

  background:#f7df88;

  height:190px;

  padding:18px;

  vertical-align:top;
}

th:last-child{

  border-right:none;
}

/* ========================= */
/* HEADER */
/* ========================= */

.day-header{

  display:flex;

  flex-direction:column;

  gap:18px;
}

.day-title{

  font-size:28px;

  font-weight:800;
}

.day-date{

  font-size:18px;

  color:#444;

  font-weight:700;
}

/* ========================= */
/* SELECT */
/* ========================= */

.time-select{

  width:100%;

  padding:14px;

  border-radius:18px;

  border:3px solid black;

  background:#fff4b0;

  font-size:18px;

  font-weight:800;

  cursor:pointer;
}

/* ========================= */
/* EXPORT */
/* ========================= */

.export-wrap{

  text-align:center;

  margin-top:25px;
}

.export-btn{

  padding:14px 28px;

  border:none;

  border-radius:18px;

  background:#ff6464;

  color:white;

  font-size:22px;

  font-weight:800;

  cursor:pointer;

  border:4px solid black;

  box-shadow:5px 5px 0px black;
}

.export-btn:hover{

  transform:translateY(-3px);
}

</style>
</head>

<body>

<div class="container">

  <!-- TITLE -->

  <div class="title-box">

    <img 
      src="./shin.jpg"
      class="title-icon"
    >

    <div class="title-text">
      LỊCH LÀM VIỆC
    </div>

    <img 
      src="./shin.jpg"
      class="title-icon"
    >

  </div>

  <!-- TOP BAR -->

  <div class="top-bar">

    <select 
      class="week-select"
      id="weekOption"
      onchange="updateWeek()"
    >

      <option value="-1">
        ⬅️ Tuần trước
      </option>

      <option value="0" selected>
        📆 Tuần này
      </option>

      <option value="1">
        ➡️ Tuần sau
      </option>

    </select>

  </div>

  <!-- PDF CONTENT -->

  <div id="pdfContent">

    <table>

      <tr id="headerRow"></tr>

    </table>

  </div>

  <!-- EXPORT BUTTON -->

  <div class="export-wrap">

    <button 
      class="export-btn"
      onclick="exportPDF()"
    >
      📄 Xuất PDF
    </button>

  </div>

</div>

<script>

/* ========================= */
/* DAYS */
/* ========================= */

const days = [
  "Thứ 2",
  "Thứ 3",
  "Thứ 4",
  "Thứ 5",
  "Thứ 6",
  "Thứ 7",
  "Chủ nhật"
];

/* ========================= */
/* GET MONDAY */
/* ========================= */

function getMonday(d){

  d = new Date(d);

  const day = d.getDay();

  const diff =
    d.getDate() - day + (day === 0 ? -6 : 1);

  return new Date(d.setDate(diff));
}

/* ========================= */
/* FORMAT DATE */
/* ========================= */

function formatDate(date){

  return date.toLocaleDateString(
    "vi-VN",
    {
      day:"2-digit",
      month:"2-digit",
      year:"numeric"
    }
  );
}

/* ========================= */
/* UPDATE WEEK */
/* ========================= */

function updateWeek(){

  const option = parseInt(
    document.getElementById("weekOption").value
  );

  const today = new Date();

  const monday = getMonday(today);

  monday.setDate(
    monday.getDate() + option * 7
  );

  createTable(monday);
}

/* ========================= */
/* CREATE TABLE */
/* ========================= */

function createTable(startDate){

  let html = "";

  for(let i=0;i<7;i++){

    const current = new Date(startDate);

    current.setDate(
      startDate.getDate() + i
    );

    html += `

      <th>

        <div class="day-header">

          <div class="day-title">
            ${days[i]}
          </div>

          <div class="day-date">
            ${formatDate(current)}
          </div>

          <select class="time-select">

            <option>
              9h - 16h
            </option>

            <option>
              9h - 13h
            </option>

            <option>
              13h - 16h
            </option>

            <option>
              🌴 Nghỉ
            </option>

          </select>

        </div>

      </th>

    `;
  }

  document.getElementById(
    "headerRow"
  ).innerHTML = html;
}

/* ========================= */
/* INIT */
/* ========================= */

updateWeek();

/* ========================= */
/* EXPORT PDF */
/* ========================= */

async function exportPDF(){

  // ẨN CHỌN TUẦN
  const topBar =
    document.querySelector(".top-bar");

  topBar.style.display = "none";

  const area =
    document.querySelector(".container");

  const canvas =
    await html2canvas(area,{
      scale:2
    });

  const imgData =
    canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;

  const pdf =
    new jsPDF(
      'landscape',
      'mm',
      'a4'
    );

  const pdfWidth =
    pdf.internal.pageSize.getWidth();

  const pdfHeight =
    (canvas.height * pdfWidth)
    / canvas.width;

  pdf.addImage(
    imgData,
    'PNG',
    0,
    0,
    pdfWidth,
    pdfHeight
  );

  // HIỆN LẠI CHỌN TUẦN
  topBar.style.display = "flex";

  pdf.save(
    "Lich_Lam_Viec_Shin.pdf"
  );
}

</script>

</body>
</html>
